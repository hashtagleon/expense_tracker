<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack – Add Transaction</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
<div class="app-layout">
  <div id="bottomNavMount"></div>

  <div class="page-content">
    <div id="topbarMount"></div>

    <div class="content-inner">
      <div class="card fade-up" style="max-width:560px;margin:0 auto;">
        <h2 id="formTitle" style="font-size:18px;font-weight:700;margin-bottom:24px;">Add Transaction</h2>

        <div id="alertBox" class="alert" style="display:none;"></div>

        <!-- Income / Expense toggle -->
        <div class="type-toggle">
          <button id="btnIncome"  class="type-btn active income"  data-type="income"><i class="ph ph-trend-up"></i> Income</button>
          <button id="btnExpense" class="type-btn expense"         data-type="expense"><i class="ph ph-trend-down"></i> Expense</button>
        </div>

        <!-- Scan Receipt Feature -->
        <button type="button" id="btnScanReceipt" class="btn btn-ghost" style="width:100%;margin-bottom:16px;border:1px dashed var(--accent);color:var(--accent);background:rgba(88,86,214,0.05);">
           <i class="ph ph-camera" style="font-size:18px;"></i> Scan Receipt with AI
        </button>
        <input type="file" id="scanInput" accept="image/*" capture="environment" style="display:none;" />

        <!-- Fullscreen Scanning Overlay -->
        <div id="scanOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#fff;">
          <div style="position:relative;width:200px;height:250px;border:2px solid var(--accent);border-radius:12px;overflow:hidden;box-shadow:0 0 30px rgba(88,86,214,0.5);">
            <img id="scanPreview" src="" style="width:100%;height:100%;object-fit:cover;opacity:0.5;" />
            <div style="position:absolute;top:0;left:0;right:0;height:4px;background:var(--accent);box-shadow:0 0 15px var(--accent);animation:scanLine 2s linear infinite;"></div>
          </div>
          <h3 style="margin-top:20px;font-size:18px;font-weight:700;">Extracting details...</h3>
          <p style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:6px;">Powered by FinTrack AI</p>
        </div>

        <form id="txForm">
          <div class="form-group">
            <label class="form-label" for="amount">Amount (৳)</label>
            <input id="amount" type="number" class="form-control"
              placeholder="0.00" min="0.01" step="0.01" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select id="category" class="form-control" required></select>
          </div>

          <div class="form-group">
            <label class="form-label" for="date">Date</label>
            <input id="date" type="date" class="form-control" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="note">Note / Description</label>
            <input id="note" type="text" class="form-control"
              placeholder="e.g. Uber to work, KFC lunch…" />
            <div id="autoTag" style="display:none;margin-top:6px;font-size:12px;color:var(--accent);font-weight:600;">
              <i class="ph ph-magic-wand"></i> Smart category detected
            </div>
          </div>

          <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="submit" id="submitBtn" class="btn btn-primary" style="flex:1;">
              Save Transaction
            </button>
            <a href="transactions.html" class="btn btn-ghost">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderTopbar, initSidebar, initTopbar, renderBottomNav, initBottomNav, fmt, todayISO, hapticFeedback } from "./js/app.js";
  import { addTransaction, getTransactionById, updateTransaction } from "./js/db.js";
  import { CATEGORIES, smartCategorize, getCategoryById } from "./js/categories.js";

  // ── Inject layout ─────────────────────────────────────────
  document.getElementById("topbarMount").innerHTML  = renderTopbar("Add Transaction");
  document.getElementById("bottomNavMount").innerHTML = renderBottomNav("add-transaction");
  initSidebar(); initTopbar(); initBottomNav();

  // Pre-fill category select
  const catSelect = document.getElementById("category");
  CATEGORIES.forEach(c => {
    const opt = document.createElement("option");
    opt.value       = c.id;
    opt.textContent = c.label;
    catSelect.appendChild(opt);
  });

  // Date default
  document.getElementById("date").value = todayISO();

  // Income / Expense toggle
  let selectedType = "income";
  document.querySelectorAll(".type-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      hapticFeedback();
      document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedType = btn.dataset.type;
    });
  });

  // Smart categorize on note input
  document.getElementById("note").addEventListener("input", (e) => {
    const note = e.target.value;
    if (note.length > 2) {
      const catId = smartCategorize(note);
      if (catId !== "others") {
        catSelect.value = catId;
        document.getElementById("autoTag").style.display = "block";
      } else {
        document.getElementById("autoTag").style.display = "none";
      }
    }
  });

  // ── AI Receipt Scanner (Mock UI) ───────────────────────
  const btnScan = document.getElementById("btnScanReceipt");
  const scanInput = document.getElementById("scanInput");
  const scanOverlay = document.getElementById("scanOverlay");
  const scanPreview = document.getElementById("scanPreview");

  btnScan.addEventListener("click", () => {
    hapticFeedback();
    scanInput.click();
  });

  scanInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (ev) => {
      scanPreview.src = ev.target.result;
      scanOverlay.style.display = "flex";
      hapticFeedback();
      
      // Simulate AI Processing (2.5 seconds)
      setTimeout(() => {
        scanOverlay.style.display = "none";
        hapticFeedback();
        
        // Mock extracted data
        const extractedAmount = (Math.random() * (2000 - 50) + 50).toFixed(2);
        document.getElementById("amount").value = extractedAmount;
        document.getElementById("note").value = "Scanned Receipt (AI Extracted)";
        document.getElementById("btnExpense").click(); // Sets type to expense
        catSelect.value = "food"; // Randomly picked food as default
        
        showAlert("Receipt scanned successfully!", "success");
        setTimeout(() => document.getElementById("alertBox").style.display="none", 3000);
      }, 2500);
    };
    reader.readAsDataURL(file);
    e.target.value = ""; // Reset input
  });

  // ── Edit mode (check ?id= param) ─────────────────────────
  let editId  = null;
  const params = new URLSearchParams(window.location.search);
  if (params.has("id")) {
    editId = params.get("id");
    document.getElementById("formTitle").textContent = "Edit Transaction";
    document.getElementById("submitBtn").textContent  = "Update Transaction";
    const titleEl = document.getElementById("topbarMount").querySelector(".topbar-title");
    if (titleEl) titleEl.textContent = "Edit Transaction";
  }

  function showAlert(msg, type = "error") {
    const a = document.getElementById("alertBox");
    a.className = `alert alert-${type}`;
    a.textContent = msg;
    a.style.display = "block";
  }

  requireAuth(async (user) => {
    // Pre-fill if editing
    if (editId) {
      const tx = await getTransactionById(editId);
      if (tx && tx.userId === user.uid) {
        document.getElementById("amount").value   = tx.amount;
        document.getElementById("date").value     = tx.date;
        document.getElementById("note").value     = tx.note || "";
        catSelect.value                            = tx.category;
        selectedType = tx.type;
        document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
        document.querySelector(`.type-btn[data-type="${tx.type}"]`)?.classList.add("active");
      } else {
        showAlert("Transaction not found.");
        editId = null;
      }
    }

    // Submit
    document.getElementById("txForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      hapticFeedback();
      const btn = document.getElementById("submitBtn");
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled  = true;

      const data = {
        amount:   parseFloat(document.getElementById("amount").value),
        type:     selectedType,
        category: catSelect.value,
        date:     document.getElementById("date").value,
        note:     document.getElementById("note").value.trim(),
      };

      try {
        if (editId) {
          await updateTransaction(editId, data);
        } else {
          await addTransaction(user.uid, { ...data, userId: user.uid });
        }
        window.location.href = "transactions.html";
      } catch (err) {
        if (err.isOffline) {
          alert("📶 " + err.message);
          window.location.href = "transactions.html";
          return;
        }
        showAlert(err.message);
        btn.innerHTML = editId ? "Update Transaction" : "Save Transaction";
        btn.disabled  = false;
      }
    });
  });
</script>
</body>
</html>
