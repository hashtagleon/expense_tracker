<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack – Login</title>
  <meta name="description" content="FinTrack – Smart money expense tracker. Login to manage your finances." />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-brand" style="display: flex; justify-content: center; margin-bottom: 32px;">
      <a href="index.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;">
        <img src="images/logo.png" alt="FinTrack Logo" style="height: 48px; width: auto; object-fit: contain;" />
        <span style="font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--text-main);">FinTrack</span>
      </a>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Login to manage your finances</p>

    <div id="alertBox" class="alert" style="display:none;"></div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" type="email" class="form-control"
          placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-control"
          placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" id="loginBtn" class="btn btn-primary btn-lg">
        Login
      </button>

      <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--text-muted)">
        <span id="forgotLink" class="auth-link">Forgot password?</span>
      </p>
    </form>

    <div style="margin-top: 16px; margin-bottom: 16px;">
      <button id="googleBtn" class="btn btn-ghost" style="width: 100%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <hr class="divider" />

    <p class="auth-footer">
      Don't have an account?
      <a href="register.html" class="auth-link">Create one</a>
    </p>

    <!-- Dark mode toggle -->
    <div style="text-align:center;margin-top:18px;">
      <button id="themeToggle" class="theme-btn" style="margin:auto;" aria-label="Toggle theme"><i class="ph-fill ph-moon"></i></button>
    </div>
  </div>
</div>

<!-- Forgot password modal -->
<div id="forgotModal" class="modal-overlay">
  <div class="modal">
    <h2 class="modal-title">Reset Password</h2>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:18px;">
      Enter your email address and we'll send you a reset link.
    </p>
    <div id="forgotAlert" class="alert" style="display:none;"></div>
    <div class="form-group">
      <input id="resetEmail" type="email" class="form-control" placeholder="you@example.com" />
    </div>
    <div style="display:flex;gap:10px;">
      <button id="sendResetBtn" class="btn btn-primary" style="flex:1;">Send Link</button>
      <button id="closeForgot" class="btn btn-ghost">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
  import { loginUser, resetPassword, loginWithGoogle } from "./js/auth.js";
  import { requireAuth, toggleTheme } from "./js/app.js";

  // Auth guard (redirect if already logged in)
  requireAuth(null);

  // Dark mode
  const themeBtn = document.getElementById("themeToggle");
  themeBtn.addEventListener("click", () => {
    toggleTheme();
    const isDark = document.documentElement.classList.contains("dark");
    themeBtn.innerHTML = isDark ? "<i class='ph-fill ph-sun'></i>" : "<i class='ph-fill ph-moon'></i>";
  });
  themeBtn.innerHTML = document.documentElement.classList.contains("dark") ? "<i class='ph-fill ph-sun'></i>" : "<i class='ph-fill ph-moon'></i>";

  // Login form
  const form      = document.getElementById("loginForm");
  const alertBox  = document.getElementById("alertBox");
  const loginBtn  = document.getElementById("loginBtn");

  function showAlert(msg, type = "error") {
    alertBox.className = `alert alert-${type}`;
    alertBox.textContent = msg;
    alertBox.style.display = "block";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginBtn.innerHTML = '<span class="spinner"></span>';
    loginBtn.disabled = true;
    try {
      await loginUser(
        document.getElementById("email").value.trim(),
        document.getElementById("password").value
      );
      window.location.href = "dashboard.html";
    } catch (err) {
      showAlert(err.message.replace("Firebase: ", "").trim());
      loginBtn.innerHTML = "Login";
      loginBtn.disabled = false;
    }
  });

  // Forgot password
  const modal       = document.getElementById("forgotModal");
  const forgotAlert = document.getElementById("forgotAlert");

  document.getElementById("forgotLink").addEventListener("click", () => {
    modal.classList.add("open");
  });
  document.getElementById("closeForgot").addEventListener("click", () => {
    modal.classList.remove("open");
  });
  modal.addEventListener("click", (e) => {
    if (e.target === modal) modal.classList.remove("open");
  });

  document.getElementById("sendResetBtn").addEventListener("click", async () => {
    const email = document.getElementById("resetEmail").value.trim();
    if (!email) return;
    try {
      await resetPassword(email);
      forgotAlert.className = "alert alert-success";
      forgotAlert.textContent = "Reset link sent! Check your inbox.";
      forgotAlert.style.display = "block";
    } catch (err) {
      forgotAlert.className = "alert alert-error";
      forgotAlert.textContent = err.message.replace("Firebase: ", "").trim();
      forgotAlert.style.display = "block";
    }
  });

  // Google Sign-In
  const googleBtn = document.getElementById("googleBtn");
  googleBtn.addEventListener("click", async () => {
    googleBtn.innerHTML = '<span class="spinner"></span>';
    googleBtn.disabled = true;
    try {
      await loginWithGoogle();
      window.location.href = "dashboard.html";
    } catch (err) {
      showAlert(err.message.replace("Firebase: ", "").trim());
      googleBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      `;
      googleBtn.disabled = false;
    }
  });
</script>
</body>
</html>
