<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack – Create Account</title>
  <meta name="description" content="Create your FinTrack account to start tracking your finances." />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-brand" style="display: flex; justify-content: center; margin-bottom: 32px;">
      <a href="index.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;">
        <img src="images/logo.png" alt="FinTrack Logo" style="height: 48px; width: auto; object-fit: contain;" />
        <span style="font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--text-main);">FinTrack</span>
      </a>
    </div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start managing your money smarter</p>

    <div id="alertBox" class="alert" style="display:none;"></div>

    <form id="registerForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input id="name" type="text" class="form-control"
          placeholder="John Smith" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" type="email" class="form-control"
          placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-control"
          placeholder="At least 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm">Confirm Password</label>
        <input id="confirm" type="password" class="form-control"
          placeholder="Repeat password" required />
      </div>

      <button type="submit" id="registerBtn" class="btn btn-primary btn-lg">
        Create Account
      </button>
    </form>

    <div style="margin-top: 16px; margin-bottom: 16px;">
      <button id="googleBtn" class="btn btn-ghost" style="width: 100%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <hr class="divider" />

    <p class="auth-footer">
      Already have an account?
      <a href="index.html" class="auth-link">Login</a>
    </p>

    <div style="text-align:center;margin-top:16px;">
      <button id="themeToggle" class="theme-btn" style="margin:auto;" aria-label="Toggle theme"><i class="ph-fill ph-moon"></i></button>
    </div>
  </div>
</div>

<script type="module">
  import { registerUser, loginWithGoogle } from "./js/auth.js";
  import { requireAuth, toggleTheme } from "./js/app.js";

  requireAuth(null);

  const themeBtn = document.getElementById("themeToggle");
  themeBtn.addEventListener("click", () => {
    toggleTheme();
    themeBtn.innerHTML = document.documentElement.classList.contains("dark") ? "<i class='ph-fill ph-sun'></i>" : "<i class='ph-fill ph-moon'></i>";
  });
  themeBtn.innerHTML = document.documentElement.classList.contains("dark") ? "<i class='ph-fill ph-sun'></i>" : "<i class='ph-fill ph-moon'></i>";

  const form        = document.getElementById("registerForm");
  const alertBox    = document.getElementById("alertBox");
  const registerBtn = document.getElementById("registerBtn");

  function showAlert(msg, type = "error") {
    alertBox.className = `alert alert-${type}`;
    alertBox.textContent = msg;
    alertBox.style.display = "block";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const name     = document.getElementById("name").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm  = document.getElementById("confirm").value;

    if (password !== confirm) {
      return showAlert("Passwords do not match.");
    }

    registerBtn.innerHTML = '<span class="spinner"></span>';
    registerBtn.disabled  = true;

    try {
      await registerUser(name, email, password);
      window.location.href = "dashboard.html";
    } catch (err) {
      showAlert(err.message.replace("Firebase: ", "").trim());
      registerBtn.innerHTML = "Create Account";
      registerBtn.disabled  = false;
    }
  });

  // Google Sign-In
  const googleBtn = document.getElementById("googleBtn");
  googleBtn.addEventListener("click", async () => {
    googleBtn.innerHTML = '<span class="spinner"></span>';
    googleBtn.disabled = true;
    try {
      await loginWithGoogle();
      window.location.href = "dashboard.html";
    } catch (err) {
      showAlert(err.message.replace("Firebase: ", "").trim());
      googleBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      `;
      googleBtn.disabled = false;
    }
  });
</script>
</body>
</html>
