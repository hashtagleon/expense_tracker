<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack – Settings</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>

  <div class="page-content">
    <div id="topbarMount"></div>

    <div class="content-inner">

      <!-- Account Info -->
      <div class="card fade-up" style="margin-bottom:20px;">
        <div class="section-header">
          <span class="section-title"><i class="ph ph-user"></i> Account</span>
        </div>
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
          <!-- Premium Avatar with Upload -->
          <div style="position:relative;width:80px;height:80px;flex-shrink:0;cursor:pointer;" id="avatarContainer">
            <div id="avatarFrame" style="width:100%;height:100%;border-radius:50%;
              background:linear-gradient(135deg,#4f46e5,#a855f7);
              display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;
              overflow:hidden;box-shadow:0 0 20px rgba(99,102,241,0.3);position:relative;z-index:2;">
              <span id="avatarLetter">?</span>
              <img id="avatarImage" src="" style="display:none;width:100%;height:100%;object-fit:cover;" />
            </div>
            <!-- Upload Overlay -->
            <div id="avatarOverlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.4);border-radius:50%;
              display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;
              opacity:0;transition:opacity 0.2s;z-index:3;">
              <i class="ph ph-camera"></i>
            </div>
            <input type="file" id="avatarInput" accept="image/*" style="display:none;" />
          </div>

          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              <div id="profileName" style="font-size:18px;font-weight:700;">Loading…</div>
              <input id="nameEditInput" type="text" class="form-control" style="display:none;font-size:16px;padding:4px 8px;width:auto;" />
              <button id="editNameBtn" class="btn btn-ghost btn-sm btn-icon" title="Edit Name"><i class="ph ph-pencil-simple"></i></button>
              <button id="saveNameBtn" class="btn btn-primary btn-sm" style="display:none;">Save</button>
            </div>
            <div id="profileEmail" style="font-size:14px;color:var(--text-muted);margin-bottom:6px;">…</div>
            <div id="memberSince" style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;">
              <i class="ph ph-calendar"></i> Member Since: <span id="joinDate">Loading…</span>
            </div>
          </div>
          <button id="changePassBtn" class="btn btn-ghost btn-sm" style="margin-top:8px;">
            <i class="ph ph-lock-key"></i> Change Password
          </button>
        </div>
      </div>

      <!-- Monthly Budget -->
      <div class="card fade-up" style="margin-bottom:20px;">
        <div class="section-header">
          <span class="section-title"><i class="ph ph-coins"></i> Monthly Budget</span>
        </div>
        <div id="budgetAlert" class="alert" style="display:none;"></div>
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
          <div class="form-group" style="flex:1;min-width:180px;margin-bottom:0;">
            <label class="form-label" for="budgetInput">Budget Amount (৳)</label>
            <input id="budgetInput" type="number" class="form-control"
              placeholder="e.g. 2000" min="0" step="10" />
          </div>
          <button id="saveBudgetBtn" class="btn btn-primary" style="height:44px;">Save Budget</button>
        </div>
        <div id="currentBudget" style="margin-top:10px;font-size:13px;color:var(--text-muted);"></div>
      </div>

      <!-- Appearance -->
      <div class="card fade-up" style="margin-bottom:20px;">
        <div class="section-header">
          <span class="section-title"><i class="ph ph-palette"></i> Appearance</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div>
            <div style="font-weight:600;margin-bottom:4px;">Dark Mode</div>
            <div style="font-size:13px;color:var(--text-muted);">Switch between light and dark theme</div>
          </div>
          <!-- Toggle switch -->
          <label class="toggle-switch" style="position:relative;display:inline-flex;align-items:center;cursor:pointer;gap:10px;">
            <input type="checkbox" id="darkModeCheck" style="display:none;" />
            <div id="toggleTrack" style="
              width:52px;height:28px;border-radius:14px;background:var(--border);
              transition:background 0.25s;position:relative;flex-shrink:0;">
              <div id="toggleThumb" style="
                position:absolute;width:22px;height:22px;border-radius:50%;
                background:#fff;top:3px;left:3px;
                box-shadow:0 2px 6px rgba(0,0,0,0.25);
                transition:left 0.25s;"></div>
            </div>
            <span id="toggleLabel" style="font-size:14px;font-weight:600;">Light</span>
          </label>
        </div>
      </div>

      <!-- Data Export -->
      <div class="card fade-up" style="margin-bottom:20px;">
        <div class="section-header">
          <span class="section-title"><i class="ph ph-export"></i> Export Data</span>
        </div>
        <p style="font-size:14px;color:var(--text-muted);margin-bottom:14px;">
          Download all your transactions as a CSV file.
        </p>
        <button id="exportBtn" class="btn btn-ghost"><i class="ph ph-download-simple"></i> Download CSV</button>
      </div>

      <!-- Logout -->
      <div class="card fade-up" style="border-color:#fecaca;">
        <div class="section-header">
          <span class="section-title" style="color:#ef4444;"><i class="ph ph-warning"></i> Danger Zone</span>
        </div>
        <p style="font-size:14px;color:var(--text-muted);margin-bottom:14px;">
          Sign out of your FinTrack account.
        </p>
        <button id="logoutSettingsBtn" class="btn btn-danger"><i class="ph ph-sign-out"></i> Logout</button>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderSidebar, renderTopbar, initSidebar, initTopbar,
           toggleTheme, fmt } from "./js/app.js";
  import { getBudget, setBudget, getUserProfile, updateUserProfile, uploadAvatar } from "./js/db.js";
  import { getTransactions }                       from "./js/db.js";
  import { logoutUser, resetPassword }             from "./js/auth.js";

  document.getElementById("sidebarMount").innerHTML = renderSidebar("settings");
  document.getElementById("topbarMount").innerHTML  = renderTopbar("Settings");
  initSidebar(); initTopbar();

  // ── Dark mode toggle ─────────────────────────────────────
  const isDark = () => document.documentElement.classList.contains("dark");
  const track  = document.getElementById("toggleTrack");
  const thumb  = document.getElementById("toggleThumb");
  const label  = document.getElementById("toggleLabel");

  function syncToggleUI() {
    const dark = isDark();
    track.style.background = dark ? "#6366f1" : "var(--border)";
    thumb.style.left       = dark ? "27px" : "3px";
    label.textContent      = dark ? "Dark" : "Light";
  }

  syncToggleUI();

  document.getElementById("toggleTrack").addEventListener("click", () => {
    toggleTheme();
    syncToggleUI();
    // sync topbar theme btn
    const btn = document.getElementById("themeToggle");
    if (btn) btn.innerHTML = isDark() ? "<i class='ph-fill ph-sun'></i>" : "<i class='ph-fill ph-moon'></i>";
  });

  requireAuth(async (user) => {
    // ── Profile ───────────────────────────────────────────
    const profile = await getUserProfile(user.uid);
    const name    = profile?.name || user.email?.split("@")[0] || "User";
    const email   = user.email;
    
    const profileNameDisp = document.getElementById("profileName");
    const profileEmailDisp= document.getElementById("profileEmail");
    const avatarLetter    = document.getElementById("avatarLetter");
    const avatarImage     = document.getElementById("avatarImage");
    const joinDateDisp    = document.getElementById("joinDate");

    const updateProfileUI = (p) => {
      const currentName = p?.name || user.email?.split("@")[0] || "User";
      profileNameDisp.textContent = currentName;
      profileEmailDisp.textContent = email;
      avatarLetter.textContent = currentName[0].toUpperCase();
      
      if (p?.photoURL) {
        avatarImage.src = p.photoURL;
        avatarImage.style.display = "block";
        avatarLetter.style.display = "none";
      } else {
        avatarImage.style.display = "none";
        avatarLetter.style.display = "block";
      }

      if (p?.createdAt) {
        const date = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
        joinDateDisp.textContent = date.toLocaleDateString("en-US", { month: 'short', year: 'numeric' });
      } else {
        joinDateDisp.textContent = "N/A";
      }
    };

    updateProfileUI(profile);

    // -- Edit Name --
    const editBtn = document.getElementById("editNameBtn");
    const saveBtn = document.getElementById("saveNameBtn");
    const nameInput = document.getElementById("nameEditInput");

    editBtn.addEventListener("click", () => {
      profileNameDisp.style.display = "none";
      editBtn.style.display = "none";
      nameInput.value = profileNameDisp.textContent;
      nameInput.style.display = "block";
      saveBtn.style.display = "block";
      nameInput.focus();
    });

    saveBtn.addEventListener("click", async () => {
      const newName = nameInput.value.trim();
      if (!newName) return;
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner"></span>';
      try {
        await updateUserProfile(user.uid, { name: newName });
        profileNameDisp.textContent = newName;
        avatarLetter.textContent = newName[0].toUpperCase();
        
        nameInput.style.display = "none";
        saveBtn.style.display = "none";
        profileNameDisp.style.display = "block";
        editBtn.style.display = "block";
      } catch (e) {
        alert("Failed to update name: " + e.message);
      }
      saveBtn.disabled = false;
      saveBtn.innerHTML = "Save";
    });

    // -- Avatar Upload --
    const avatarContainer = document.getElementById("avatarContainer");
    const avatarOverlay = document.getElementById("avatarOverlay");
    const avatarInput = document.getElementById("avatarInput");

    avatarContainer.addEventListener("mouseenter", () => avatarOverlay.style.opacity = "1");
    avatarContainer.addEventListener("mouseleave", () => avatarOverlay.style.opacity = "0");
    avatarContainer.addEventListener("click", () => avatarInput.click());

    avatarInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (!file.type.startsWith('image/')) {
        alert("Please upload an image file.");
        return;
      }
      // Keep it under 500KB for Firestore performance
      if (file.size > 500 * 1024) {
        alert("File is too large. For the free plan, please upload an image under 500KB.");
        return;
      }
      
      avatarOverlay.innerHTML = '<span class="spinner" style="width:16px;height:16px;"></span>';
      avatarOverlay.style.opacity = "1";
      
      const reader = new FileReader();
      reader.onload = async (event) => {
        const base64 = event.target.result;
        try {
          await uploadAvatar(user.uid, base64);
          avatarImage.src = base64;
          avatarImage.style.display = "block";
          avatarLetter.style.display = "none";
          alert("Profile photo updated successfully!");
        } catch (e) {
          console.error("Avatar upload error:", e);
          alert("Failed to update photo: " + e.message);
        } finally {
          avatarOverlay.innerHTML = '<i class="ph ph-camera"></i>';
          avatarOverlay.style.opacity = "0";
        }
      };
      reader.readAsDataURL(file);
    });

    // -- Change Password --
    document.getElementById("changePassBtn").addEventListener("click", async () => {
      const btn = document.getElementById("changePassBtn");
      const originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-top-color:var(--accent);"></span> Sending...';
      try {
        await resetPassword(user.email);
        alert("Password reset email sent to " + user.email);
      } catch (e) {
        alert("Error: " + e.message);
      }
      btn.disabled = false;
      btn.innerHTML = originalHtml;
    });

    // ── Budget ────────────────────────────────────────────
    const budget = await getBudget(user.uid);
    if (budget.monthlyBudget) {
      document.getElementById("budgetInput").value = budget.monthlyBudget;
      document.getElementById("currentBudget").textContent =
        `Current budget: ${fmt(budget.monthlyBudget)} / month`;
    }

    document.getElementById("saveBudgetBtn").addEventListener("click", async () => {
      const amount = parseFloat(document.getElementById("budgetInput").value);
      if (!amount || amount < 0) return;
      const btn = document.getElementById("saveBudgetBtn");
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled  = true;
      try {
        await setBudget(user.uid, amount);
        document.getElementById("currentBudget").textContent = `Current budget: ${fmt(amount)} / month`;
        const a = document.getElementById("budgetAlert");
        a.className   = "alert alert-success";
        a.textContent = "Budget saved successfully!";
        a.style.display = "block";
        setTimeout(() => { a.style.display = "none"; }, 3000);
      } catch (e) {
        const a = document.getElementById("budgetAlert");
        a.className = "alert alert-error";
        a.textContent = e.message;
        a.style.display = "block";
      }
      btn.innerHTML = "Save Budget";
      btn.disabled  = false;
    });

    // ── Export CSV ────────────────────────────────────────
    document.getElementById("exportBtn").addEventListener("click", async () => {
      const txs  = await getTransactions(user.uid);
      const rows = [["Date","Type","Category","Note","Amount"]];
      txs.forEach(t => rows.push([t.date, t.type, t.category, t.note||"", t.amount]));
      const csv  = rows.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const link = document.createElement("a");
      link.href     = URL.createObjectURL(blob);
      link.download = "fintrack-transactions.csv";
      link.click();
    });

    // ── Logout ────────────────────────────────────────────
    document.getElementById("logoutSettingsBtn").addEventListener("click", logoutUser);
  });
</script>
</body>
</html>
